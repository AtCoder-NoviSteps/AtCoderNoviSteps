            >
            <div class="flex gap-4 items-center">
              <select
                id="source-select"
                class="bg-white border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-500 focus:border-primary-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500"
              >
                <!-- <option value="" selected disabled>選択してください</option> -->

                <option value="aoj_pck_prelim">AOJ - パソコン甲子園 予選</option>

                <option value="aoj_jag_domestic">AOJ - JAG 模擬国内</option>
                <option value="aoj_jag_regional">AOJ - JAG 模擬地区</option>
              </select>
              <button
                id="fetch-button"
                type="button"
                class="text-white bg-primary-700 hover:bg-primary-800 focus:ring-4 focus:ring-primary-300 font-medium rounded-lg text-xs px-4 py-2 dark:bg-primary-600 dark:hover:bg-primary-700 focus:outline-none dark:focus:ring-primary-800 flex items-center gap-2 whitespace-nowrap"
              >
                <i data-lucide="download" class="w-4 h-4"></i>
                問題を取得
              </button>
            </div>
          </div>
        </section>
      </div>

      <section id="results-section" class="hidden">
        <h2 class="text-xl font-semibold flex items-center gap-2 mb-4">
          <i data-lucide="list" class="w-5 h-5 text-primary-500"></i>
          一覧
        </h2>
        <div class="flex items-center justify-between mb-4">
          <div class="relative">
            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
              <i data-lucide="search" class="w-4 h-4 text-gray-400"></i>
            </div>
            <input
              id="search-input"
              type="text"
              placeholder="コンテストID・コンテスト名・問題名で絞り込み"
              class="block w-96 pl-9 pr-3 py-2 text-sm text-gray-900 border border-gray-300 rounded-lg bg-white focus:ring-primary-500 focus:border-primary-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white dark:placeholder-gray-400 dark:focus:ring-primary-500 dark:focus:border-primary-500"
            />

          <div id="pagination-top" class="flex items-center gap-2"></div>
        </div>
        <div class="relative overflow-x-auto shadow-md sm:rounded-lg">
          <table class="w-full text-sm text-left rtl:text-right text-gray-500 dark:text-gray-400">
            <thead
              class="text-xs text-gray-700 uppercase bg-gray-100 dark:bg-gray-700 dark:text-gray-400"
            >
              <tr>
                <th
                  scope="col"
                  class="px-6 py-3 w-1/6 cursor-pointer select-none hover:bg-gray-200 dark:hover:bg-gray-600"
                  id="sort-id"
                >
                  <div class="flex items-center gap-1">
                    コンテストID <span id="sort-id-icon" class="text-gray-400"></span>
                  </div>
                </th>
                <th
                  scope="col"
                  class="px-6 py-3 w-1/3 cursor-pointer select-none hover:bg-gray-200 dark:hover:bg-gray-600"
                  id="sort-title"
                >
                  <div class="flex items-center gap-1">
                    コンテスト名 <span id="sort-title-icon" class="text-gray-400"></span>
                  </div>
                </th>
                <th scope="col" class="px-6 py-3 w-5/12">問題名</th>
                <th scope="col" class="px-6 py-3 text-right"></th>
              </tr>
            </thead>
            <tbody
              id="table-body"
              class="divide-y divide-gray-200 dark:divide-gray-700 bg-white dark:bg-gray-800"
            ></tbody>
          </table>
        </div>
        <div class="flex justify-end mt-3">
          <div id="pagination-bottom" class="flex items-center gap-2"></div>
        </div>
      </section>

      const sourceSelect = document.getElementById('source-select');
      const fetchButton = document.getElementById('fetch-button');
      const resultsSection = document.getElementById('results-section');
      const tableBody = document.getElementById('table-body');
      const loadingState = document.getElementById('loading-state');
      const paginationTop = document.getElementById('pagination-top');
      const paginationBottom = document.getElementById('pagination-bottom');
      const searchInput = document.getElementById('search-input');

      const PAGE_SIZE = 10;
      let currentPage = 1;
      let currentContests = [];
      let filteredContests = [];
      let sortKey = null;
      let sortAsc = true;

      const sortIdHeader = document.getElementById('sort-id');
      const sortTitleHeader = document.getElementById('sort-title');
      const sortIdIcon = document.getElementById('sort-id-icon');
      const sortTitleIcon = document.getElementById('sort-title-icon');

      const applySort = () => {
        if (!sortKey) return;
        filteredContests = [...filteredContests].sort((a, b) => {
          const cmp = a[sortKey].localeCompare(b[sortKey], 'ja');
          return sortAsc ? cmp : -cmp;
        });
      };

      const updateSortIcons = () => {
        sortIdIcon.textContent = sortKey === 'id' ? (sortAsc ? '▲' : '▼') : '';
        sortTitleIcon.textContent = sortKey === 'title' ? (sortAsc ? '▲' : '▼') : '';
      };

      const onSortClick = (key) => {
        if (sortKey === key) {
          sortAsc = !sortAsc;
        } else {
          sortKey = key;
          sortAsc = true;
        }
        applySort();
        updateSortIcons();
        currentPage = 1;
        renderPage();
        lucide.createIcons();
      };

      sortIdHeader.addEventListener('click', () => onSortClick('id'));
      sortTitleHeader.addEventListener('click', () => onSortClick('title'));

      fetchButton.addEventListener('click', () => {
        const source = sourceSelect.value;
        if (!source) return;

        resultsSection.classList.add('hidden');
        loadingState.style.display = 'flex';

        setTimeout(() => {
          currentContests = mockData[source] || [];
          searchInput.value = '';
          filteredContests = currentContests;
          sortKey = null;
          sortAsc = true;
          updateSortIcons();
          currentPage = 1;
          renderPage();
          loadingState.style.display = 'none';
          resultsSection.classList.remove('hidden');
          lucide.createIcons();
        }, 500);
      });

      searchInput.addEventListener('input', () => {
        const query = searchInput.value.trim().toLowerCase();
        filteredContests = query
          ? currentContests.filter(
              (c) =>
                c.id.toLowerCase().includes(query) ||
                c.title.toLowerCase().includes(query) ||
                c.tasks.some((t) => t.title.toLowerCase().includes(query)),
            )
          : currentContests;
        applySort();
        currentPage = 1;
        renderPage();
        lucide.createIcons();
      });

      function renderPage() {
        const totalPages = Math.ceil(filteredContests.length / PAGE_SIZE);
        const start = (currentPage - 1) * PAGE_SIZE;
        const pageContests = filteredContests.slice(start, start + PAGE_SIZE);

        tableBody.innerHTML = '';
        if (pageContests.length === 0) {
          const row = document.createElement('tr');
          row.innerHTML = `<td colspan="4" class="px-6 py-4 text-center text-sm text-gray-400 dark:text-gray-500">該当するコンテストが見つかりませんでした</td>`;
          tableBody.appendChild(row);
        }
        pageContests.forEach((contest) => {
          const row = document.createElement('tr');
          row.className = 'bg-white dark:bg-gray-800 border-b dark:border-gray-700';
          const taskList = contest.tasks.map((task) => `<li>${task.title}</li>`).join('');
          row.innerHTML = `
            <td class="px-6 py-4 font-mono text-xs">${contest.id}</td>
            <td class="px-6 py-4">${contest.title}</td>
            <td class="px-6 py-4"><ul class="list-disc list-inside">${taskList}</ul></td>
            <td class="px-6 py-4 text-right whitespace-nowrap">
              <button type="button" class="text-white bg-primary-700 hover:bg-primary-800 focus:ring-4 focus:outline-none focus:ring-primary-300 font-medium rounded-lg text-xs px-3 py-2 dark:bg-primary-600 dark:hover:bg-primary-700 dark:focus:ring-primary-800">
                インポート
              </button>
            </td>
          `;
          tableBody.appendChild(row);
        });

        renderPagination(paginationTop, totalPages);
        renderPagination(paginationBottom, totalPages);
      }

      function renderPagination(container, totalPages) {
        const btnBase =
          'flex items-center justify-center px-3 h-8 text-sm font-medium rounded-lg border';
        const btnInactive = `${btnBase} text-gray-500 bg-white border-gray-300 hover:bg-gray-100 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-gray-700`;
        const btnDisabled = `${btnBase} text-gray-300 bg-white border-gray-200 cursor-not-allowed dark:bg-gray-800 dark:border-gray-700 dark:text-gray-600`;

        container.innerHTML = '';

        const prevBtn = document.createElement('button');
        prevBtn.type = 'button';
        prevBtn.innerHTML = '<i data-lucide="chevron-left" class="w-4 h-4"></i>';
        prevBtn.className = currentPage === 1 ? btnDisabled : btnInactive;
        prevBtn.disabled = currentPage === 1;
        prevBtn.addEventListener('click', () => {
          currentPage--;
          renderPage();
          lucide.createIcons();
        });
        container.appendChild(prevBtn);

        const pageInfo = document.createElement('span');
        pageInfo.className = 'text-sm text-gray-600 dark:text-gray-400 px-1';
        pageInfo.textContent = `${currentPage} / ${totalPages}`;
        container.appendChild(pageInfo);

        const nextBtn = document.createElement('button');
        nextBtn.type = 'button';
        nextBtn.innerHTML = '<i data-lucide="chevron-right" class="w-4 h-4"></i>';
        nextBtn.className = currentPage === totalPages ? btnDisabled : btnInactive;
        nextBtn.disabled = currentPage === totalPages;
        nextBtn.addEventListener('click', () => {
          currentPage++;
          renderPage();
          lucide.createIcons();
        });
        container.appendChild(nextBtn);
      }
