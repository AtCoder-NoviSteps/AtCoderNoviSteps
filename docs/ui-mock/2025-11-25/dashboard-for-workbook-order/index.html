<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AtCoder NoviSteps - Dashboard for Workbook Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* A little visual feedback for the card being dragged */
      .kanban-card.dragging {
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <div class="container mx-auto p-4">
      <h2 class="text-4xl font-extrabold dark:text-white text-center mb-8">
        Workbook Order Dashboard
      </h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <!-- Data Structure Column -->
        <div class="kanban-column bg-gray-100 dark:bg-gray-800 rounded-lg p-4">
          <h3 class="text-xl font-semibold mb-4 text-gray-900 dark:text-white">データ構造</h3>
          <!-- Card 1 -->
          <div
            class="kanban-card bg-white dark:bg-gray-700 shadow-md rounded-lg p-3 mb-3 cursor-grab"
            draggable="true"
          >
            <h4 class="font-bold text-gray-900 dark:text-white">集合（set）</h4>
          </div>
          <!-- Card 2 -->
          <div
            class="kanban-card bg-white dark:bg-gray-700 shadow-md rounded-lg p-3 mb-3 cursor-grab"
            draggable="true"
          >
            <h4 class="font-bold text-gray-900 dark:text-white">連想配列（map・dict）</h4>
          </div>
          <!-- Card 3 -->
          <div
            class="kanban-card bg-white dark:bg-gray-700 shadow-md rounded-lg p-3 mb-3 cursor-grab"
            draggable="true"
          >
            <h4 class="font-bold text-gray-900 dark:text-white">キュー（queue）</h4>
          </div>
          <!-- Card 4 -->
          <div
            class="kanban-card bg-white dark:bg-gray-700 shadow-md rounded-lg p-3 mb-3 cursor-grab"
            draggable="true"
          >
            <h4 class="font-bold text-gray-900 dark:text-white">スタック（stack）</h4>
          </div>
        </div>

        <!-- Graph theory Column -->
        <div class="kanban-column bg-gray-100 dark:bg-gray-800 rounded-lg p-4">
          <h3 class="text-xl font-semibold mb-4 text-gray-900 dark:text-white">グラフ理論</h3>
          <!-- Card 1 -->
          <div
            class="kanban-card bg-white dark:bg-gray-700 shadow-md rounded-lg p-3 mb-3 cursor-grab"
            draggable="true"
          >
            <h4 class="font-bold text-gray-900 dark:text-white">幅優先探索（BFS）</h4>
          </div>
          <!-- Card 2 -->
          <div
            class="kanban-card bg-white dark:bg-gray-700 shadow-md rounded-lg p-3 mb-3 cursor-grab"
            draggable="true"
          >
            <h4 class="font-bold text-gray-900 dark:text-white">深さ優先探索（DFS）</h4>
          </div>
          <!-- Card 3 -->
          <div
            class="kanban-card bg-white dark:bg-gray-700 shadow-md rounded-lg p-3 mb-3 cursor-grab"
            draggable="true"
          >
            <h4 class="font-bold text-gray-900 dark:text-white">トライ木（trie）</h4>
          </div>
          <!-- Card 4 -->
          <div
            class="kanban-card bg-white dark:bg-gray-700 shadow-md rounded-lg p-3 mb-3 cursor-grab"
            draggable="true"
          >
            <h4 class="font-bold text-gray-900 dark:text-white">Union Find</h4>
          </div>
        </div>

        <!-- 10Q Column -->
        <div class="kanban-column bg-gray-100 dark:bg-gray-800 rounded-lg p-4">
          <h3 class="text-xl font-semibold mb-4 text-gray-900 dark:text-white">
            カリキュラム・10Q
          </h3>
          <!-- Card 1 -->
          <div
            class="kanban-card bg-white dark:bg-gray-700 shadow-md rounded-lg p-3 mb-3 cursor-grab"
            draggable="true"
          >
            <h4 class="font-bold text-gray-900 dark:text-white">標準入出力（1 個の整数）</h4>
          </div>
          <!-- Card 2 -->
          <div
            class="kanban-card bg-white dark:bg-gray-700 shadow-md rounded-lg p-3 mb-3 cursor-grab"
            draggable="true"
          >
            <h4 class="font-bold text-gray-900 dark:text-white">標準入出力（2 個以上の整数）</h4>
          </div>
          <!-- Card 3 -->
          <div
            class="kanban-card bg-white dark:bg-gray-700 shadow-md rounded-lg p-3 mb-3 cursor-grab"
            draggable="true"
          >
            <h4 class="font-bold text-gray-900 dark:text-white">
              10Q 総合問題（全部解く必要はない）
            </h4>
          </div>
        </div>

        <!-- 9Q Column -->
        <div class="kanban-column bg-gray-100 dark:bg-gray-800 rounded-lg p-4">
          <h3 class="text-xl font-semibold mb-4 text-gray-900 dark:text-white">カリキュラム・9Q</h3>
          <!-- Card 1 -->
          <div
            class="kanban-card bg-white dark:bg-gray-700 shadow-md rounded-lg p-3 mb-3 cursor-grab"
            draggable="true"
          >
            <h4 class="font-bold text-gray-900 dark:text-white">演算子「+」「-」「*」の優先順位</h4>
          </div>
          <!-- Card 2 -->
          <div
            class="kanban-card bg-white dark:bg-gray-700 shadow-md rounded-lg p-3 mb-3 cursor-grab"
            draggable="true"
          >
            <h4 class="font-bold text-gray-900 dark:text-white">浮動小数点数</h4>
          </div>
          <!-- Card 3 -->
          <div
            class="kanban-card bg-white dark:bg-gray-700 shadow-md rounded-lg p-3 mb-3 cursor-grab"
            draggable="true"
          >
            <h4 class="font-bold text-gray-900 dark:text-white">文字列 ①</h4>
          </div>
          <!-- Card 4 -->
          <div
            class="kanban-card bg-white dark:bg-gray-700 shadow-md rounded-lg p-3 mb-3 cursor-grab"
            draggable="true"
          >
            <h4 class="font-bold text-gray-900 dark:text-white">
              9Q 総合問題（全部解く必要はない）
            </h4>
          </div>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const cards = document.querySelectorAll('.kanban-card');
        const columns = document.querySelectorAll('.kanban-column');
        let draggedCard = null;

        cards.forEach((card) => {
          card.addEventListener('dragstart', () => {
            draggedCard = card;
            setTimeout(() => {
              card.classList.add('dragging');
            }, 0);
          });

          card.addEventListener('dragend', () => {
            draggedCard.classList.remove('dragging');
            draggedCard = null;
          });
        });

        columns.forEach((column) => {
          column.addEventListener('dragover', (e) => {
            e.preventDefault();
            const afterElement = getDragAfterElement(column, e.clientY);
            if (afterElement == null) {
              column.appendChild(draggedCard);
            } else {
              column.insertBefore(draggedCard, afterElement);
            }
          });
        });

        function getDragAfterElement(column, y) {
          const draggableElements = [...column.querySelectorAll('.kanban-card:not(.dragging)')];

          return draggableElements.reduce(
            (closest, child) => {
              const box = child.getBoundingClientRect();
              const offset = y - box.top - box.height / 2;
              if (offset < 0 && offset > closest.offset) {
                return { offset: offset, element: child };
              } else {
                return closest;
              }
            },
            { offset: Number.NEGATIVE_INFINITY },
          ).element;
        }
      });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.0/flowbite.min.js"></script>
  </body>
</html>
